name: Build LabVIEW CI Image

on:
  push:
    branches: [main]
    paths:
      - '.github/docker/labview-ci.Dockerfile'
      - '.github/workflows/build-labview-image.yml'
      - '.github/labview/vipm/**'
      - 'COTC Dependencies.vipc'
  schedule:
    # Monthly rebuild to pick up NI base image security updates
    - cron: '0 4 1 * *'
  workflow_dispatch:
    inputs:
      push_latest:
        description: 'Also tag the image as :latest'
        type: boolean
        default: false

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/challenge-of-champions-labview
  DEFAULT_TAG: '2026'

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    # IMPORTANT: windows-latest resolves to Server 2025 which has a broken
    # Docker daemon. Always pin to windows-2022.
    runs-on: windows-2022

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate date tag
        id: date
        shell: bash
        run: echo "date=$(date +'%Y%m%d')" >> "$GITHUB_OUTPUT"

      - name: Build and push LabVIEW CI image
        shell: powershell
        run: |
          $base  = '${{ env.IMAGE_NAME }}'
          $ver   = '${{ env.DEFAULT_TAG }}'
          $date  = '${{ steps.date.outputs.date }}'
          $tags  = @("${base}:${ver}", "${base}:${ver}-${date}")
          if ('${{ github.event.inputs.push_latest }}' -eq 'true') {
            $tags += "${base}:latest"
          }

          # Build — context is repo root so Dockerfile can COPY vipm/ and .vipc
          $tagFlags = ($tags | ForEach-Object { "-t", $_ })
          docker build -f .github/docker/labview-ci.Dockerfile @tagFlags .
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

          foreach ($tag in $tags) {
            Write-Host "Pushing $tag"
            docker push $tag
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          }

      - name: Summary
        shell: bash
        run: |
          echo "### Docker image published" >> "$GITHUB_STEP_SUMMARY"
          echo "- \`${{ env.IMAGE_NAME }}:${{ env.DEFAULT_TAG }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- \`${{ env.IMAGE_NAME }}:${{ env.DEFAULT_TAG }}-${{ steps.date.outputs.date }}\`" >> "$GITHUB_STEP_SUMMARY"
