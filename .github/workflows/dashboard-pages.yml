name: CI Dashboard — GitHub Pages

# Thin, config-driven caller: the dashboard build logic lives in the shared
# composite action in elijah286/LabVIEW-CI-with-Containers, checked out at the
# version this repo has opted into (.github/labview-ci.yml: source.ref). The
# dashboard updates only when you opt in via the "Update now" button (which
# bumps source.ref), never automatically. This file owns the triggers + deploy.

on:
  push:
    branches: [main]
    paths:
      # Opting into a new tooling version (source.ref) rebuilds the dashboard
      # from that version's action; the badge reads catalog.json.
      - '.github/labview-ci.yml'
      - '.github/labview-ci/catalog.json'
      - '.github/workflows/dashboard-pages.yml'
      # Refresh the VI Browser's file-tree index (vi-snapshots/files.json) on any
      # change to the VI set, so a revision's hierarchy is browsable immediately —
      # even before (or without) snapshots, and even if no other CI activity runs.
      - '**.vi'
      - '**.ctl'
  # Rebuild whenever ANY CI activity reports a commit status. The dashboard's
  # badges are sourced from each commit's statuses, so reacting to the `status`
  # event keeps it current for every workflow that posts one — present or future —
  # with no per-workflow enumeration and no polling. The dashboard only *reads*
  # statuses (it never posts one), so this can never self-trigger a loop.
  status:
  # Also rebuild after workflows that publish page artifacts (snapshots, diff
  # reports) without necessarily posting a commit status.
  workflow_run:
    workflows:
      - "Mass Compile — Windows Container"
      - "Mass Compile Backfill — Windows Container"
      - "Run VI Analyzer — Windows Container"
      - "Run VI Analyzer — Linux Container"
      - "VIDiff Report — Windows Container"
      - "VIDiff Report — Linux Container"
      - "VIDiff Deploy — Pages + PR Comment"
      - "VIDiff Backfill — Windows Container"
      - "VIDiff Backfill — Linux Container"
      - "VI Snapshots and VI Browser"
    types: [completed]
  workflow_dispatch:

# A single push fans out into many status events (each check reports pending then
# success/failure), so collapse overlapping triggers into one latest-wins rebuild
# instead of running a separate deploy for every individual status update.
concurrency:
  group: dashboard-pages
  cancel-in-progress: true

env:
  # Repo-agnostic: derive the Pages site from the repo (owner.github.io/repo).
  # Override with an Actions variable PAGES_URL for custom domains.
  PAGES_URL: ${{ vars.PAGES_URL || format('https://{0}.github.io/{1}', github.repository_owner, github.event.repository.name) }}

permissions:
  contents: write
  pages: write
  actions: read

jobs:
  build-dashboard:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Read the capability version this repo opted into; the dashboard action is
      # pulled at exactly that ref, so it never changes version automatically.
      - name: Read opted-in tooling ref from config
        id: cfg
        shell: bash
        run: |
          REF=$(awk '/^[[:space:]]*ref:[[:space:]]/{print $2; exit}' .github/labview-ci.yml 2>/dev/null)
          echo "ref=${REF:-v1}" >> "$GITHUB_OUTPUT"
          echo "Dashboard tooling ref (source.ref): ${REF:-v1}"

      - name: Check out tooling (opted-in version)
        uses: actions/checkout@v4
        with:
          repository: elijah286/LabVIEW-CI-with-Containers
          ref: ${{ steps.cfg.outputs.ref }}
          path: _lvci

      # Build the dashboard from the shared action at the opted-in version. It
      # reads commit statuses + Pages content, stages the tooling pages it
      # bundles, writes the VI Browser's files.json, and emits ci-out/dashboard.
      - name: Build CI dashboard
        uses: ./_lvci/actions/dashboard
        with:
          repo: ${{ github.repository }}
          pages-url: ${{ env.PAGES_URL }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy dashboard to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ci-out/dashboard
          destination_dir: .
          keep_files: true
