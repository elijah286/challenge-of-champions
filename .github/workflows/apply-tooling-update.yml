# Apply LabVIEW CI update — one-click, TOKEN-FREE opt-in to a newer tooling version.
#
# The "Update now" button in the What's New dialog (.github/pages/whats-new.html)
# deep-links here. Dispatching this workflow does NOT re-pull or rewrite any workflow
# files. It edits exactly one config file — .github/labview-ci.yml — bumping
# `source.ref` (the capability version this repo has opted into) and `installedVersion`
# to the chosen release. The shared reusable workflow (@v1) reads that ref at runtime
# and checks out the tooling at it, so this single config change is all that's needed
# to move the whole pipeline to the new version. Because a config file is not a
# workflow file, the built-in GITHUB_TOKEN can push it — no PAT, no secrets.
#
# The change is opened as a reviewable pull request; merge to finish. Nothing updates
# automatically: capabilities stay on their pinned version until someone clicks this.
# GitHub's own "Run workflow" gate limits dispatch to users with write access.
name: Apply LabVIEW CI update

on:
  workflow_dispatch:
    inputs:
      target_version:
        description: "Version to adopt (blank = latest published). e.g. 1.5.0 or v1.5.0"
        required: false
        default: ''
      enable_new_capabilities:
        description: 'Also enable newly published capabilities (otherwise they stay dormant)'
        type: boolean
        default: false

concurrency:
  group: apply-tooling-update
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        # No PAT: this update edits only .github/labview-ci.yml (a config file, not a
        # workflow file), which the built-in GITHUB_TOKEN is permitted to push.

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Bump the opted-in version in config (token-free)
        id: apply
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TARGET_VERSION: ${{ inputs.target_version }}
          ENABLE_NEW: ${{ inputs.enable_new_capabilities }}
        run: |
          set -euo pipefail
          CFG=.github/labview-ci.yml
          if [ ! -f "$CFG" ]; then
            echo "::error::$CFG not found — this repo is not configured as a LabVIEW CI consumer."
            exit 1
          fi

          SRC_REPO=$(awk '/^[[:space:]]*repo:[[:space:]]/{print $2; exit}' "$CFG")
          SRC_REPO=${SRC_REPO:-elijah286/LabVIEW-CI-with-Containers}
          export SRC_REPO
          echo "source repo: $SRC_REPO"

          # Read the source catalog (public repo — the built-in token can read it) to
          # learn the latest published version and capability list. No tooling files are
          # downloaded; only this repo's config is edited, so no PAT is required.
          if ! gh api "repos/$SRC_REPO/contents/.github/labview-ci/catalog.json" \
                 -H "Accept: application/vnd.github.raw" > /tmp/catalog.json 2>/tmp/cat-err; then
            cat /tmp/cat-err || true
            echo "::error::could not read catalog.json from ${SRC_REPO} (is it public/readable?)."
            exit 1
          fi

          python3 - <<'PY'
          import os, re, json
          cfg = '.github/labview-ci.yml'
          orig = open(cfg, encoding='utf-8').read()
          lines = orig.splitlines()

          def scalar(key):
              for l in lines:
                  m = re.match(rf'^{key}:\s*(\S+)', l)
                  if m: return m.group(1)
              return None
          installed = scalar('installedVersion') or 'unknown'

          # source.ref is nested under a top-level `source:` block
          cur_ref, in_src = None, False
          for l in lines:
              if re.match(r'^source:\s*$', l): in_src = True; continue
              if in_src:
                  if re.match(r'^\S', l): in_src = False
                  else:
                      m = re.match(r'^\s*ref:\s*(\S+)', l)
                      if m: cur_ref = m.group(1)
          cur_ref = cur_ref or 'v1'

          acts, in_acts, indent = [], False, '  '
          for l in lines:
              if re.match(r'^activities:\s*$', l): in_acts = True; continue
              if in_acts:
                  m = re.match(r'^(\s*)-\s*(\S+)', l)
                  if m: acts.append(m.group(2)); indent = m.group(1)
                  elif re.match(r'^\S', l): in_acts = False

          cat = json.load(open('/tmp/catalog.json', encoding='utf-8'))
          tv = (os.environ.get('TARGET_VERSION') or '').strip().lstrip('v')
          latest = tv or str(cat.get('version', '')).strip()
          if not re.match(r'^\d+\.\d+\.\d+$', latest):
              raise SystemExit(f'::error::invalid target version {latest!r}')
          new_ref = 'v' + latest

          stable = [c['id'] for c in cat.get('capabilities', []) if c.get('status') == 'stable']
          newcaps = [c for c in stable if c not in acts]
          enable_new = os.environ.get('ENABLE_NEW', 'false').lower() == 'true'
          to_enable = newcaps if enable_new else []

          # rewrite installedVersion + source.ref only
          out, in_src = [], False
          for l in lines:
              if re.match(r'^installedVersion:\s*', l):
                  out.append(f'installedVersion: {latest}'); continue
              if re.match(r'^source:\s*$', l):
                  in_src = True; out.append(l); continue
              if in_src:
                  if re.match(r'^\S', l): in_src = False
                  elif re.match(r'^\s*ref:\s*', l):
                      out.append(re.sub(r'(ref:\s*)\S+', r'\g<1>' + new_ref, l)); continue
              out.append(l)

          # optionally enable newly-available capabilities by appending to the list
          if to_enable:
              res, in_acts, last = [], False, -1
              for l in out:
                  res.append(l)
                  if re.match(r'^activities:\s*$', l): in_acts = True; last = len(res) - 1; continue
                  if in_acts:
                      if re.match(r'^\s*-\s*\S+', l): last = len(res) - 1
                      elif re.match(r'^\S', l): in_acts = False
              res[last + 1:last + 1] = [f'{indent}- {c}' for c in to_enable]
              out = res

          new = '\n'.join(out)
          if not new.endswith('\n'): new += '\n'
          changed = new != orig
          if changed: open(cfg, 'w', encoding='utf-8').write(new)

          with open(os.environ['GITHUB_OUTPUT'], 'a', encoding='utf-8') as f:
              f.write(f'installed={installed}\n')
              f.write(f'latest={latest}\n')
              f.write(f'cur_ref={cur_ref}\n')
              f.write(f'new_ref={new_ref}\n')
              f.write(f'source_repo={os.environ.get("SRC_REPO", "")}\n')
              f.write(f'changed={"true" if changed else "false"}\n')
              f.write(f'newcaps={",".join(newcaps)}\n')
              f.write(f'enabled={",".join(to_enable)}\n')
          print(f'installed {installed} -> {latest}; ref {cur_ref} -> {new_ref}; '
                f'changed={changed}; available_new={newcaps}; enabling={to_enable}')
          PY

      - name: Open the update pull request
        if: steps.apply.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          INSTALLED: ${{ steps.apply.outputs.installed }}
          LATEST: ${{ steps.apply.outputs.latest }}
          CUR_REF: ${{ steps.apply.outputs.cur_ref }}
          NEW_REF: ${{ steps.apply.outputs.new_ref }}
          SOURCE_REPO: ${{ steps.apply.outputs.source_repo }}
          NEWCAPS: ${{ steps.apply.outputs.newcaps }}
          ENABLED: ${{ steps.apply.outputs.enabled }}
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          BRANCH="ci/update-tooling-${NEW_REF}"
          git checkout -B "$BRANCH"
          git add .github/labview-ci.yml

          {
            echo "Opts this repository into **LabVIEW CI ${NEW_REF}** (was ${CUR_REF}; installed v${INSTALLED} → v${LATEST}), sourced from \`${SOURCE_REPO}\`."
            echo ""
            echo "**Token-free, config-only.** The sole change is \`.github/labview-ci.yml\` (\`source.ref\` + \`installedVersion\`). No workflow files are touched, so the built-in token can apply it. The shared reusable workflow (pinned \`@v1\`) reads \`source.ref\` at runtime and runs the tooling at that version."
            echo ""
            if [ -n "${ENABLED:-}" ]; then
              echo "Newly **enabled** capabilities: ${ENABLED}."
              echo ""
            elif [ -n "${NEWCAPS:-}" ]; then
              echo "Newly **available** capabilities (left dormant — re-run with *enable new capabilities*, or toggle them on the Configure page): ${NEWCAPS}."
              echo ""
            fi
            echo "Triggered from the dashboard **Update now** button. Review and merge to finish — the version badge turns green and the pipeline runs the new version."
          } > /tmp/pr-body.md

          git commit -m "ci: opt in to LabVIEW CI ${NEW_REF} (config-only)"

          if ! git push -u origin "$BRANCH" --force 2>/tmp/push-err; then
            cat /tmp/push-err || true
            echo "::error title=Push failed::Could not push the update branch."
            exit 1
          fi

          URL=$(gh pr list --head "$BRANCH" --state open --json url --jq '.[0].url // empty')
          if [ -n "$URL" ]; then
            gh pr edit "$URL" --body-file /tmp/pr-body.md >/dev/null || true
            echo "Updated existing PR: $URL"
          elif URL=$(gh pr create --title "ci: opt in to LabVIEW CI ${NEW_REF}" \
                       --base "${{ github.ref_name }}" --head "$BRANCH" \
                       --body-file /tmp/pr-body.md 2>/tmp/pr-err); then
            echo "Opened PR: $URL"
          else
            cat /tmp/pr-err || true
            URL="${{ github.server_url }}/${{ github.repository }}/compare/${{ github.ref_name }}...${BRANCH}?expand=1"
            echo "::warning title=Open the PR manually::GitHub Actions is not permitted to open PRs in this repo. Enable Settings > Actions > General > 'Allow GitHub Actions to create and approve pull requests', or use the link in the summary. The branch is already pushed."
            {
              echo "## ⬆️ Update branch ready — open the pull request"
              echo ""
              echo "Opts into LabVIEW CI **${CUR_REF} → ${NEW_REF}** (v${INSTALLED} → v${LATEST}), committed to branch \`${BRANCH}\`."
              echo ""
              echo "**[Open the pull request](${URL})** to review and merge."
              echo ""
              echo "> To make this fully one-click next time, enable **Settings > Actions > General > Workflow permissions > 'Allow GitHub Actions to create and approve pull requests'**."
            } >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          {
            echo "## ✅ Update pull request ready"
            echo ""
            echo "Opts into LabVIEW CI **${CUR_REF} → ${NEW_REF}** (v${INSTALLED} → v${LATEST}), a single config-file change."
            echo ""
            echo "**[Review &amp; merge the pull request](${URL})** to finish the update."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Report no-op when already on the target version
        if: steps.apply.outputs.changed != 'true'
        env:
          LATEST: ${{ steps.apply.outputs.latest }}
          NEW_REF: ${{ steps.apply.outputs.new_ref }}
        run: |
          {
            echo "## ✅ Already up to date"
            echo ""
            echo "This repository is already opted into **LabVIEW CI ${NEW_REF}** (v${LATEST}). No changes were needed."
          } >> "$GITHUB_STEP_SUMMARY"
          echo "No changes — already on ${NEW_REF}."
