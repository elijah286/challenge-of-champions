# Check for LabVIEW CI tooling updates (consumer-side).
#
# challenge-of-champions consumes its CI tooling from a dedicated repo
# (see .github/labview-ci.yml: source.repo). This workflow makes the consumer's
# update story visible and actionable, with no LabVIEW required:
#
#   1. SHOW CURRENT VERSION — reads installedVersion from .github/labview-ci.yml.
#   2. SEE IF UPDATES EXIST  — fetches the source repo's catalog.json version and
#      compares. The result is written to the run summary AND surfaced as a
#      tracking GitHub Issue (a visible, linkable "update available" signal that
#      auto-closes when you are back up to date).
#   3. UPTAKE FROM THE UX    — run this workflow with apply=true to open a PR that
#      bumps installedVersion to the latest and (optionally) enables newly
#      available capability ids in .github/labview-ci.yml. Review + merge to adopt.
#
# Intentionally self-contained (one file, stdlib + gh only) so it composes with —
# and never depends on — the dashboard version badge.
name: Check for tooling updates

on:
  schedule:
    - cron: '17 8 * * 1'      # weekly, Mondays 08:17 UTC
  workflow_dispatch:
    inputs:
      apply:
        description: 'Open a PR that adopts the latest tooling version'
        type: boolean
        default: false
      capabilities:
        description: 'Comma-separated capability ids to ENABLE on uptake (blank = version bump only)'
        required: false
        default: ''

concurrency:
  group: tooling-update-check
  cancel-in-progress: false

permissions:
  contents: write          # create the uptake PR branch
  pull-requests: write     # open the uptake PR
  issues: write            # maintain the "update available" tracking issue

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Detect installed vs latest tooling version
        id: detect
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          THIS_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json, re, os, subprocess, sys, base64

          CFG = '.github/labview-ci.yml'
          installed, src_repo, src_ref = '', '', 'main'
          activities, in_acts = [], False
          try:
              for line in open(CFG, encoding='utf-8').read().splitlines():
                  if re.match(r'^\s*activities:\s*$', line):
                      in_acts = True; continue
                  if in_acts:
                      m = re.match(r'^\s*-\s*(\S+)', line)
                      if m: activities.append(m.group(1)); continue
                      in_acts = False
                  m = re.match(r'^\s*installedVersion:\s*(\S+)', line)
                  if m: installed = m.group(1).strip()
                  m = re.match(r'^\s*repo:\s*(\S+)', line)
                  if m and not src_repo: src_repo = m.group(1).strip()
                  m = re.match(r'^\s*ref:\s*(\S+)', line)
                  if m and src_ref == 'main': src_ref = m.group(1).strip()
          except FileNotFoundError:
              print(f'::error::{CFG} not found — this repo is not configured as a consumer.', file=sys.stderr)
              sys.exit(1)

          if not src_repo:
              src_repo = 'elijah286/LabVIEW-CI-with-Containers'

          # Latest published version = source repo's catalog.json on its default
          # branch (gh api uses the default branch when no ref is given).
          latest, caps = '', []
          try:
              raw = subprocess.check_output(
                  ['gh', 'api', f'repos/{src_repo}/contents/.github/labview-ci/catalog.json',
                   '--jq', '.content'], text=True)
              cat = json.loads(base64.b64decode(raw).decode('utf-8'))
              latest = str(cat.get('version', '') or '')
              caps = [c['id'] for c in cat.get('capabilities', []) if c.get('status') == 'stable']
          except Exception as e:
              print(f'::warning::Could not fetch source catalog from {src_repo}: {e}', file=sys.stderr)

          def parse(v):
              p = re.findall(r'\d+', v or '')[:3]
              return tuple(int(x) for x in p) + (0,) * (3 - len(p))

          update = bool(installed and latest and parse(latest) > parse(installed))
          new_caps = [c for c in caps if c not in activities]

          owner, _, name = src_repo.partition('/')
          whats_new = f'https://{owner.lower()}.github.io/{name}/whats-new.html?repo={os.environ.get("THIS_REPO","")}'

          # Job outputs.
          with open(os.environ['GITHUB_OUTPUT'], 'a', encoding='utf-8') as fh:
              for k, v in [('installed', installed or 'unknown'), ('latest', latest or 'unknown'),
                           ('source_repo', src_repo), ('update', 'true' if update else 'false'),
                           ('new_caps', ','.join(new_caps)), ('whats_new', whats_new)]:
                  fh.write(f'{k}={v}\n')

          # Run summary (at-a-glance UX).
          status = '⬆️ **Update available**' if update else '✅ Up to date'
          lines = ['## LabVIEW CI tooling — version check', '',
                   '| | |', '|---|---|',
                   f'| Installed (this repo) | `v{installed or "unknown"}` |',
                   f'| Latest (`{src_repo}`) | `v{latest or "unknown"}` |',
                   f'| Status | {status} |', '']
          if update:
              lines += ['**Adopt it:** run this workflow again with **apply = true**, '
                        'or merge the Dependabot PR that bumps the `@v1` pin.']
              if new_caps:
                  lines += ['', f'Newly available capabilities: `{", ".join(new_caps)}`']
          with open(os.environ['GITHUB_STEP_SUMMARY'], 'a', encoding='utf-8') as fh:
              fh.write('\n'.join(lines) + '\n')

          # Issue body (built here to avoid bash heredoc quoting pitfalls).
          ib = [f'A newer version of the LabVIEW CI tooling is available from `{src_repo}`.', '',
                '| | |', '|---|---|',
                f'| Installed here | `v{installed}` |',
                f'| Latest available | `v{latest}` |', '',
                f"**What's new:** {whats_new}", '',
                '### Adopt this update',
                '- Run the **Check for tooling updates** workflow with `apply = true` to open an uptake PR, **or**',
                '- Merge the Dependabot PR that bumps the `@v1` pin in `.github/workflows/labview-ci.yml`.']
          if new_caps:
              ib += ['', f'_Newly available capabilities:_ `{", ".join(new_caps)}`']
          ib += ['', '<sub>Maintained automatically by `.github/workflows/check-tooling-updates.yml`. '
                 'Closes when this repo is back up to date.</sub>']
          open('/tmp/issue-body.md', 'w', encoding='utf-8').write('\n'.join(ib) + '\n')
          print(f'installed=v{installed} latest=v{latest} update={update}')
          PY

      - name: Maintain "update available" tracking issue
        if: ${{ github.event_name != 'workflow_dispatch' || !inputs.apply }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          UPDATE: ${{ steps.detect.outputs.update }}
          INSTALLED: ${{ steps.detect.outputs.installed }}
          LATEST: ${{ steps.detect.outputs.latest }}
        run: |
          set -euo pipefail
          LABEL="tooling-update"
          gh label create "$LABEL" --color D29922 \
            --description "An update to the consumed LabVIEW CI tooling is available" 2>/dev/null || true
          EXISTING=$(gh issue list --label "$LABEL" --state open --json number --jq '.[0].number // empty')

          if [ "$UPDATE" = "true" ]; then
            if [ -n "$EXISTING" ]; then
              gh issue edit "$EXISTING" --body-file /tmp/issue-body.md >/dev/null
              echo "Updated tracking issue #$EXISTING"
            else
              gh issue create --title "LabVIEW CI tooling update available: v$LATEST" \
                --label "$LABEL" --body-file /tmp/issue-body.md >/dev/null
              echo "Opened tracking issue for v$LATEST"
            fi
          else
            if [ -n "$EXISTING" ]; then
              gh issue comment "$EXISTING" --body "Back up to date (v${INSTALLED}). Closing." >/dev/null
              gh issue close "$EXISTING" >/dev/null
              echo "Closed tracking issue #$EXISTING (up to date)"
            else
              echo "Up to date; no tracking issue."
            fi
          fi

      - name: Open uptake pull request
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.apply && steps.detect.outputs.update == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          INSTALLED: ${{ steps.detect.outputs.installed }}
          LATEST: ${{ steps.detect.outputs.latest }}
          SOURCE_REPO: ${{ steps.detect.outputs.source_repo }}
          NEW_CAPS: ${{ steps.detect.outputs.new_caps }}
          ENABLE: ${{ inputs.capabilities }}
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          BRANCH="ci/adopt-tooling-v${LATEST}"
          git checkout -B "$BRANCH"

          python3 - <<'PY'
          import os, re
          cfg = '.github/labview-ci.yml'
          latest = os.environ['LATEST']
          enable = [c.strip() for c in os.environ.get('ENABLE', '').split(',') if c.strip()]
          new_caps = [c.strip() for c in os.environ.get('NEW_CAPS', '').split(',') if c.strip()]
          src = os.environ['SOURCE_REPO']; installed = os.environ['INSTALLED']
          lines = open(cfg, encoding='utf-8').read().splitlines()

          out, done = [], False
          for line in lines:
              if re.match(r'^\s*installedVersion:\s*', line):
                  out.append(f'installedVersion: {latest}'); done = True
              else:
                  out.append(line)
          if not done:
              ins = []
              for line in out:
                  ins.append(line)
                  if re.match(r'^\s*schemaVersion:\s*', line):
                      ins.append(f'installedVersion: {latest}')
              out = ins

          if enable:
              res, in_acts, acts = [], False, []
              for line in out:
                  if re.match(r'^\s*activities:\s*$', line):
                      in_acts = True; res.append(line); continue
                  if in_acts:
                      m = re.match(r'^\s*-\s*(\S+)', line)
                      if m: acts.append(m.group(1)); res.append(line); continue
                      for c in enable:
                          if c not in acts: res.append(f'  - {c}'); acts.append(c)
                      in_acts = False
                  res.append(line)
              if in_acts:
                  for c in enable:
                      if c not in acts: res.append(f'  - {c}')
              out = res

          open(cfg, 'w', encoding='utf-8').write('\n'.join(out) + '\n')

          body = [f'Adopts LabVIEW CI tooling **v{installed} -> v{latest}** from `{src}`.', '',
                  '- Bumps `installedVersion` in `.github/labview-ci.yml`.']
          if enable:
              body.append(f'- Enables capabilities: `{", ".join(enable)}`')
          not_enabled = [c for c in new_caps if c not in enable]
          if not_enabled:
              body.append(f'- Available but not enabled here yet: `{", ".join(not_enabled)}` '
                          '(add to `activities` when ready)')
          body += ['', '> Also ensure the reusable-workflow pin in '
                   '`.github/workflows/labview-ci.yml` references a tag that includes these '
                   'capabilities. Review and merge to adopt.']
          open('/tmp/pr-body.md', 'w', encoding='utf-8').write('\n'.join(body) + '\n')
          PY

          if git diff --quiet -- .github/labview-ci.yml; then
            echo "No change to apply."; exit 0
          fi
          git add .github/labview-ci.yml
          git commit -m "ci: adopt LabVIEW CI tooling v${LATEST}"
          git push -u origin "$BRANCH" --force
          gh pr create --title "ci: adopt LabVIEW CI tooling v${LATEST}" \
            --base "${{ github.ref_name }}" --head "$BRANCH" --body-file /tmp/pr-body.md
