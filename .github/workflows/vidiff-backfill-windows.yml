name: VIDiff Backfill — Windows Container

# Windows-container counterpart of the Linux VIDiff backfill. Generates Windows
# diff reports across history so the VI Browser can toggle Linux <-> Windows and
# the two container renders can be compared. Resumable and incremental.

on:
  workflow_dispatch:
    inputs:
      max_commits:
        description: 'Cap to most recent N VI-touching commits (0 = all)'
        required: false
        default: '0'
      time_budget_minutes:
        description: 'Stop launching new diffs after N minutes (resume next run)'
        required: false
        default: '300'

concurrency:
  group: vidiff-backfill-windows
  cancel-in-progress: false

env:
  LABVIEW_CONTAINER_IMAGE: nationalinstruments/labview:latest-windows
  PAGES_URL: https://elijah286.github.io/challenge-of-champions

permissions:
  contents: write
  pages: write

jobs:
  vidiff-backfill-windows:
    runs-on: windows-2022   # windows-latest = Server 2025, broken Docker daemon
    timeout-minutes: 350

    steps:
      - name: Checkout repository (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout deployed VIDiff (gh-pages) for incremental skip
        uses: actions/checkout@v4
        continue-on-error: true
        with:
          ref: gh-pages
          path: _pages
          sparse-checkout: vidiff
          sparse-checkout-cone-mode: false

      - name: Ensure Docker daemon is running
        shell: powershell
        run: |
          $svc = Get-Service docker -ErrorAction SilentlyContinue
          if (-not $svc) { Write-Error 'Docker service not found on runner'; exit 1 }
          if ($svc.Status -ne 'Running') { Start-Service docker; Start-Sleep -Seconds 5 }
          docker version

      - name: Run VIDiff backfill (warm Windows container, walks history)
        id: backfill
        shell: powershell
        run: |
          & .github\labview\vidiff-backfill.ps1 `
            -WorkspaceRoot     '${{ github.workspace }}' `
            -OutRoot           '${{ github.workspace }}\ci-out\vidiff-backfill' `
            -Image             "$Env:LABVIEW_CONTAINER_IMAGE" `
            -MaxCommits        ${{ github.event.inputs.max_commits || '0' }} `
            -ExistingDir       '${{ github.workspace }}\_pages\vidiff' `
            -TimeBudgetMinutes ${{ github.event.inputs.time_budget_minutes || '300' }}
        continue-on-error: true

      - name: Verify backfill output
        id: verify
        shell: bash
        run: |
          if [ -n "$(find ci-out/vidiff-backfill -name changes.json 2>/dev/null | head -1)" ]; then
            echo "ok=true" >> "$GITHUB_OUTPUT"
            echo "Generated reports:"
            find ci-out/vidiff-backfill -name changes.json | sed 's|/windows/vidiff/changes.json||;s|.*/push-|  push-|'
          else
            echo "ok=false" >> "$GITHUB_OUTPUT"
            echo "No new reports generated (all commits may already be done)."
          fi

      - name: Deploy VIDiff reports to GitHub Pages
        if: steps.verify.outputs.ok == 'true'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ${{ github.workspace }}/ci-out/vidiff-backfill
          destination_dir: vidiff
          keep_files: true   # preserve existing reports (incl. all Linux ones)
