<!DOCTYPE html>
<!--
  .github/pages/vi-browser.html
  Deployed to: https://elijah286.github.io/challenge-of-champions/vi-snapshots/index.html

  Reads manifest.json and commits.json from the same directory (vi-snapshots/)
  on the gh-pages branch and renders a browseable gallery of VI snapshots.
-->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>VI Browser — challenge-of-champions</title>
  <style>
    :root{
      --bg:#0d1117;
      --fg:#e6edf3;
      --fg-muted:#8b949e;
      --border:#30363d;
      --sidebar:#161b22;
      --sidebar-hover:#1c2128;
      --sidebar-active:#1f6feb33;
      --item:#c9d1d9;
      --link:#58a6ff;
      --viewer-bg:#ffffff;
      --error:#da3633;
    }
    @media (prefers-color-scheme: light){
      :root{
        --bg:#ffffff;
        --fg:#1f2328;
        --fg-muted:#57606a;
        --border:#d0d7de;
        --sidebar:#f6f8fa;
        --sidebar-hover:#eef2f6;
        --sidebar-active:#0969da22;
        --item:#1f2328;
        --link:#0969da;
        --viewer-bg:#ffffff;
        --error:#cf222e;
      }
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
         background:var(--bg);color:var(--fg);display:flex;height:100vh;overflow:hidden}

    /* ── Sidebar ── */
    #sidebar{width:280px;min-width:220px;background:var(--sidebar);border-right:1px solid var(--border);
             display:flex;flex-direction:column;overflow:hidden}
    #sidebar-header{padding:12px 14px;border-bottom:1px solid var(--border)}
    #sidebar-header h1{font-size:1em;color:var(--fg);margin-bottom:8px}
    #commit-select{width:100%;background:var(--bg);color:var(--fg);border:1px solid var(--border);
                   border-radius:6px;padding:5px 8px;font-size:.8em}
    #search{width:100%;background:var(--bg);color:var(--fg);border:1px solid var(--border);
            border-radius:6px;padding:5px 8px;font-size:.8em;margin-top:6px}
    #vi-list{flex:1;overflow-y:auto;padding:4px 0}
    .tree-controls{display:flex;gap:14px;margin-top:8px}
    .tree-controls button{background:none;border:none;padding:0;font:inherit;font-size:.72em;
                          color:var(--link);cursor:pointer}
    .tree-controls button:hover{text-decoration:underline}
    .tree-row{display:flex;align-items:center;gap:6px;padding:4px 12px 4px 10px;font-size:.8em;
              cursor:pointer;color:var(--item);white-space:nowrap;overflow:hidden;user-select:none}
    .tree-row:hover{background:var(--sidebar-hover);color:var(--fg)}
    .tree-row .twisty{flex:0 0 12px;width:12px;height:12px;display:inline-flex;align-items:center;
                      justify-content:center;color:var(--fg-muted);transition:transform .12s ease}
    .tree-row.folder.open>.twisty{transform:rotate(90deg)}
    .tree-row .icon{flex:0 0 16px;display:inline-flex;align-items:center;justify-content:center;color:var(--fg-muted)}
    .tree-row .label{flex:1 1 auto;min-width:0;overflow:hidden;text-overflow:ellipsis}
    .tree-row.folder>.label{font-weight:500;color:var(--fg)}
    .tree-row.file.active{background:var(--sidebar-active);color:var(--link)}
    .tree-row.file.active .icon{color:var(--link)}
    .sidebar-note{padding:16px;color:var(--fg-muted);font-size:.8em}
    /* change indicators sourced from the VIDiff changes.json for the selected commit */
    .chg{flex:0 0 auto;font-size:.64em;font-weight:700;padding:1px 6px;border-radius:10px;
         color:#fff;text-transform:uppercase;letter-spacing:.03em;cursor:pointer}
    .chg.modified{background:#9a6700}.chg.added{background:#1a7f37}.chg.deleted{background:#cf222e}
    .chg:hover{filter:brightness(1.15)}
    .chg-dot{flex:0 0 auto;width:7px;height:7px;border-radius:50%;background:#9a6700;opacity:.85}
    /* "Changed only" toggle (shown only when the commit has VIDiff data) */
    .changed-toggle{display:none;align-items:center;gap:6px;margin-top:8px;font-size:.74em;
                    color:var(--fg-muted);cursor:pointer;user-select:none}
    .changed-toggle input{margin:0;accent-color:var(--link)}
    .changed-toggle .count{color:var(--fg-muted);font-weight:600}

    /* ── Main panel ── */
    #main{flex:1;display:flex;flex-direction:column;overflow:hidden}
    #toolbar{padding:8px 14px;border-bottom:1px solid var(--border);background:var(--sidebar);
             font-size:.82em;color:var(--fg-muted);display:flex;align-items:center;gap:10px;flex-wrap:wrap}
    #vi-title{font-weight:600;color:var(--fg)}
    #viewer{flex:1;overflow:hidden}
    #viewer iframe{width:100%;height:100%;border:none;background:var(--viewer-bg)}
    #empty{flex:1;display:flex;align-items:center;justify-content:center;
           flex-direction:column;color:var(--fg-muted);gap:10px}
    #empty svg{opacity:.3}
  </style>
</head>
<body>

<div id="sidebar">
  <div id="sidebar-header">
    <h1>VI Browser</h1>
    <select id="commit-select"><option value="">Loading commits…</option></select>
    <input id="search" type="search" placeholder="Filter VIs…">
    <div class="tree-controls">
      <button id="expand-all" type="button">Expand all</button>
      <button id="collapse-all" type="button">Collapse all</button>
    </div>
    <label class="changed-toggle" id="changed-toggle" for="changed-only">
      <input type="checkbox" id="changed-only">
      Changed VIs only <span class="count" id="changed-count"></span>
    </label>
  </div>
  <div id="vi-list"></div>
</div>

<div id="main">
  <div id="toolbar">
    <span id="vi-title">Select a VI from the sidebar</span>
    <a id="diff-link" href="#" style="color:var(--link);font-weight:600;display:none">View diff report &rarr;</a>
    <a id="open-link" href="#" target="_blank" style="color:var(--link);display:none">Open in new tab ↗</a>
  </div>
  <div id="empty">
    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
      <rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/>
    </svg>
    <span>Select a VI to view its front panel and block diagram</span>
  </div>
  <div id="viewer" style="display:none"><iframe id="vi-frame" title="VI Snapshot"></iframe></div>
</div>

<script>
// Resolve the directory this page lives in. Stripping the trailing path segment
// yields the same base whether the page is opened as ".../vi-snapshots/" or as
// ".../vi-snapshots/index.html" (the dashboard deep-links use index.html?sha=).
// The previous regex appended a slash to "index.html", which 404'd commits.json
// and showed "No snapshots yet".
const BASE = window.location.pathname.replace(/[^/]*$/, '');

async function fetchJson(url) {
  const r = await fetch(url, { cache: 'no-store' });
  if (!r.ok) throw new Error(`${r.status} ${url}`);
  return r.json();
}

let manifest = [];
let treeRoot = null;             // hierarchical tree built from each VI's vi_rel path
const expanded = new Set();      // folder paths currently expanded (persists across commits)
let activeHtml = null;           // html of the currently-open VI (drives row highlight)
let changeMap = {};              // vi_rel -> { type, url } from the commit's VIDiff changes.json
let changedFolders = new Set();  // folder paths that contain >=1 changed VI (for the folder dot)
let changedOnly = new URLSearchParams(location.search).get('changed') === '1'; // down-filter to changed VIs

const ICON = {
  chevron: '<svg viewBox="0 0 16 16" width="10" height="10" fill="currentColor"><path d="M6 4l4 4-4 4z"/></svg>',
  folder:  '<svg viewBox="0 0 16 16" width="14" height="14" fill="currentColor"><path d="M1.5 4A1.5 1.5 0 013 2.5h2.8L7.3 4H13A1.5 1.5 0 0114.5 5.5v6A1.5 1.5 0 0113 13H3a1.5 1.5 0 01-1.5-1.5z"/></svg>',
  vi:      '<svg viewBox="0 0 16 16" width="13" height="13" fill="none" stroke="currentColor" stroke-width="1.3"><rect x="3.2" y="2.2" width="9.6" height="11.6" rx="1.5"/><path d="M5.6 6h4.8M5.6 8.4h4.8M5.6 10.8h3"/></svg>',
};

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
}

// Build a folder tree from the flat manifest using each VI's on-disk relative path.
function buildTree(items) {
  const root = { name:'', path:'', dirs:new Map(), files:[] };
  for (const v of items) {
    const parts = v.vi_rel.split('/');
    parts.pop();                       // drop the file name; the rest are folders
    let node = root, acc = '';
    for (const p of parts) {
      acc = acc ? acc + '/' + p : p;
      if (!node.dirs.has(p)) node.dirs.set(p, { name:p, path:acc, dirs:new Map(), files:[] });
      node = node.dirs.get(p);
    }
    node.files.push(v);
  }
  return root;
}

function allFolderPaths(node, out = []) {
  for (const child of node.dirs.values()) { out.push(child.path); allFolderPaths(child, out); }
  return out;
}

// A VI passes the active filters when it matches the text query AND, if the
// "Changed VIs only" toggle is on, has a VIDiff change entry for this commit.
function fileVisible(v, f) {
  if (changedOnly && !changeMap[v.vi_rel]) return false;
  if (f && !(v.vi_name.toLowerCase().includes(f) || v.vi_rel.toLowerCase().includes(f))) return false;
  return true;
}

// True if the folder (or any descendant) contains a VI that passes the filters.
function nodeHasVisible(node, f) {
  for (const v of node.files) if (fileVisible(v, f)) return true;
  for (const child of node.dirs.values()) if (nodeHasVisible(child, f)) return true;
  return false;
}

async function loadCommits() {
  const commits = await fetchJson(BASE + 'commits.json').catch(() => []);
  const sel = document.getElementById('commit-select');
  sel.innerHTML = '';
  if (!commits.length) {
    sel.innerHTML = '<option value="">No snapshots yet</option>';
    return;
  }
  for (const c of commits) {
    const opt = document.createElement('option');
    opt.value   = c.sha;
    opt.textContent = `${c.short} — ${c.message.slice(0, 40)}`;
    sel.appendChild(opt);
  }
  sel.addEventListener('change', () => loadManifest(sel.value));
  const initSha = new URLSearchParams(window.location.search).get('sha');
  const startSha = (initSha && commits.find(c => c.sha === initSha)) ? initSha : commits[0].sha;
  sel.value = startSha;
  loadManifest(startSha);
}

async function loadManifest(sha) {
  manifest = await fetchJson(BASE + sha + '/manifest.json').catch(() => []);
  treeRoot = buildTree(manifest);
  activeHtml = null;
  await loadChanges(sha);
  updateChangedToggle();
  renderList(document.getElementById('search').value);
}

// Show/enable the "Changed VIs only" toggle when this commit has VIDiff data, and
// keep its checkbox + count in sync. Hidden (and disabled) when there are no changes.
function updateChangedToggle() {
  const count = Object.keys(changeMap).length;
  const wrap  = document.getElementById('changed-toggle');
  document.getElementById('changed-count').textContent = count ? `(${count})` : '';
  wrap.style.display = count ? 'inline-flex' : 'none';
  if (!count) changedOnly = false;
  document.getElementById('changed-only').checked = changedOnly;
}

// Pull the VIDiff change set for this commit so the tree can flag changed VIs and
// deep-link to their diff reports. The diff reports live as a sibling of
// vi-snapshots/ on Pages:  <root>/vidiff/push-<sha>/<platform>/vidiff/changes.json
// Missing data (a commit without a VIDiff run) degrades gracefully to no badges.
async function loadChanges(sha) {
  changeMap = {};
  changedFolders = new Set();
  const root = BASE.replace(/vi-snapshots\/$/, '');
  for (const platform of ['linux', 'windows']) {
    const dir = `${root}vidiff/push-${sha}/${platform}/vidiff/`;
    let data = null;
    try { data = await fetchJson(dir + 'changes.json'); } catch (e) { continue; }
    if (data && Array.isArray(data.files) && data.files.length) {
      for (const f of data.files) {
        if (!f.file) continue;
        changeMap[f.file] = { type: f.type, url: dir + f.report };
        const parts = f.file.split('/'); parts.pop();
        let acc = '';
        for (const p of parts) { acc = acc ? acc + '/' + p : p; changedFolders.add(acc); }
      }
      return;   // first platform that has data wins
    }
  }
}

// Render a tree node's folders (then files) into the fragment. When a filter is
// active, non-matching branches are pruned and matching ones are force-expanded.
function renderTree(node, depth, f, frag) {
  const pad = (10 + depth * 14) + 'px';
  const dirNames = [...node.dirs.keys()].sort((a, b) => a.localeCompare(b, undefined, { sensitivity:'base' }));
  for (const name of dirNames) {
    const child = node.dirs.get(name);
    if (!nodeHasVisible(child, f)) continue;
    // Auto-expand while any filter (text or changed-only) is narrowing the tree.
    const forceOpen = !!f || changedOnly;
    const open = forceOpen ? true : expanded.has(child.path);
    const row = document.createElement('div');
    row.className = 'tree-row folder' + (open ? ' open' : '');
    row.style.paddingLeft = pad;
    row.title = child.path;
    const dot = changedFolders.has(child.path) ? '<span class="chg-dot" title="contains changed VIs"></span>' : '';
    row.innerHTML =
      `<span class="twisty">${ICON.chevron}</span>` +
      `<span class="icon">${ICON.folder}</span>` +
      `<span class="label">${escapeHtml(name)}</span>` + dot;
    row.addEventListener('click', () => {
      if (expanded.has(child.path)) expanded.delete(child.path); else expanded.add(child.path);
      renderList(document.getElementById('search').value);
    });
    frag.appendChild(row);
    if (open) renderTree(child, depth + 1, f, frag);
  }
  const files = node.files.slice().sort((a, b) => a.vi_name.localeCompare(b.vi_name, undefined, { sensitivity:'base' }));
  for (const v of files) {
    if (!fileVisible(v, f)) continue;
    const row = document.createElement('div');
    row.className = 'tree-row file' + (v.html === activeHtml ? ' active' : '');
    row.style.paddingLeft = pad;
    row.title = v.vi_rel;
    row.dataset.html = v.html;
    row.dataset.name = v.vi_rel;
    row.innerHTML =
      `<span class="twisty"></span>` +
      `<span class="icon">${ICON.vi}</span>` +
      `<span class="label">${escapeHtml(v.vi_name)}</span>`;
    row.addEventListener('click', () => openVI(row));
    const chg = changeMap[v.vi_rel];
    if (chg) {
      const badge = document.createElement('span');
      badge.className = 'chg ' + chg.type;
      badge.textContent = chg.type === 'modified' ? 'diff' : chg.type;
      badge.title = chg.type === 'modified'
        ? 'View side-by-side diff report'
        : `VI ${chg.type} in this revision — view report`;
      badge.addEventListener('click', (e) => { e.stopPropagation(); openDiff(chg.url, v.vi_rel, chg.type, row); });
      row.appendChild(badge);
    }
    frag.appendChild(row);
  }
}

function renderList(filter) {
  const f = (filter || '').trim().toLowerCase();
  const container = document.getElementById('vi-list');
  container.innerHTML = '';
  if (!treeRoot || !manifest.length) {
    container.innerHTML = '<div class="sidebar-note">No VIs in this revision.</div>';
    return;
  }
  const frag = document.createDocumentFragment();
  renderTree(treeRoot, 0, f, frag);
  if (!frag.childNodes.length) {
    const msg = changedOnly ? 'No changed VIs in this revision.' : 'No VIs match the filter.';
    container.innerHTML = `<div class="sidebar-note">${msg}</div>`;
    return;
  }
  container.appendChild(frag);
}

function setActiveRow(row) {
  document.querySelectorAll('.tree-row.file.active').forEach(el => el.classList.remove('active'));
  if (row) row.classList.add('active');
}

function showInFrame(url, title) {
  document.getElementById('vi-title').textContent = title;
  const open = document.getElementById('open-link');
  open.href = url; open.style.display = 'inline';
  document.getElementById('empty').style.display  = 'none';
  document.getElementById('viewer').style.display = 'block';
  document.getElementById('vi-frame').src = url;
}

// Configure the toolbar "View diff report" link for the given VI (or hide it).
function setDiffLink(viRel) {
  const chg = changeMap[viRel];
  const diffLink = document.getElementById('diff-link');
  if (chg) {
    diffLink.textContent = (chg.type === 'modified' ? 'View diff report' : `View ${chg.type} report`) + ' \u2192';
    diffLink.href = chg.url;
    diffLink.onclick = (e) => { e.preventDefault(); showInFrame(chg.url, `${viRel} \u2014 ${chg.type === 'modified' ? 'diff' : chg.type}`); };
    diffLink.style.display = 'inline';
  } else {
    diffLink.style.display = 'none';
  }
}

function openVI(row) {
  setActiveRow(row);
  activeHtml = row.dataset.html;
  // Snapshots are content-addressed and shared across commits, so the manifest's
  // `html` is relative to the vi-snapshots base (e.g. "by-blob/ab/<blob>.html").
  setDiffLink(row.dataset.name);
  showInFrame(`${BASE}${row.dataset.html}`, row.dataset.name);
}

// Open a VIDiff report (side-by-side for modified VIs; single-version snapshot for
// added/deleted), triggered from a tree badge or the toolbar link.
function openDiff(url, viRel, type, row) {
  setActiveRow(row || null);
  activeHtml = row ? row.dataset.html : null;
  setDiffLink(viRel);
  showInFrame(url, `${viRel} \u2014 ${type === 'modified' ? 'diff' : type}`);
}

document.getElementById('search').addEventListener('input', e => renderList(e.target.value));
document.getElementById('changed-only').addEventListener('change', e => {
  changedOnly = e.target.checked;
  renderList(document.getElementById('search').value);
});
document.getElementById('expand-all').addEventListener('click', () => {
  if (treeRoot) allFolderPaths(treeRoot).forEach(p => expanded.add(p));
  renderList(document.getElementById('search').value);
});
document.getElementById('collapse-all').addEventListener('click', () => {
  expanded.clear();
  renderList(document.getElementById('search').value);
});

loadCommits().catch(err => {
  document.getElementById('vi-list').innerHTML =
    `<div style="padding:16px;color:var(--error);font-size:.8em">Error loading gallery:<br>${err.message}</div>`;
});
</script>
</body>
</html>
